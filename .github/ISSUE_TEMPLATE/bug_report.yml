name: Bug 报告
description: 报告一个问题，帮助我们改进 netq
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: 发生了什么？
      description: 你做了什么操作，出现了什么结果？
      placeholder: 例如：运行 `netq --doctor github.com` 后……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关输出/日志
      description: 请粘贴命令输出（注意脱敏）
      render: shell
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15 ...
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node 版本
      placeholder: 例如 20.12.2 / 22.3.0 ...
    validations:
      required: true

