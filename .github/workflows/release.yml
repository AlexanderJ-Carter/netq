name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          node -e "const pkg=require('./package.json'); const tag=process.env.TAG; const expected='v'+pkg.version; if(tag!==expected){console.error('Tag/version mismatch:', tag, '!=', expected); process.exit(1)} console.log('OK:', tag)"
        env:
          TAG: ${{ github.ref_name }}
      - name: Build package tarball
        run: |
          npm pack
          ls -la
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tgz"

