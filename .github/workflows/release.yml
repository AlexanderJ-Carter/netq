name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7bfe1e2d3e5e4575d2d8a347a24f # v4.0.0
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
      - name: Run tests
        run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7bfe1e2d3e5e4575d2d8a347a24f # v4.0.0
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          node -e "const pkg=require('./package.json'); const tag=process.env.TAG; const expected='v'+pkg.version; if(tag!==expected){console.error('Tag/version mismatch:', tag, '!=', expected); process.exit(1)} console.log('OK:', tag)"
        env:
          TAG: ${{ github.ref_name }}
      - name: Build package tarball
        run: |
          npm pack
          ls -la
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8d91274ee2819c4c2b55cf5614 # v2.2.1
        with:
          generate_release_notes: true
          files: "*.tgz"
